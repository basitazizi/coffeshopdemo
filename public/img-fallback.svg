<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF3B7F"/>
      <stop offset="1" stop-color="#F5A500"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="56" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="256" cy="232" r="148" fill="url(#ring)"/>
    <circle cx="256" cy="232" r="74" fill="#fffaf0"/>
  </g>
  <g fill="#1a1a1a" font-family="Nunito, Arial, sans-serif" text-anchor="middle">
    <text x="256" y="410" font-size="22" font-weight="800" opacity="0.72">Image unavailable</text>
    <text x="256" y="440" font-size="14" font-weight="700" opacity="0.5">Check your connection or URL</text>
  </g>
